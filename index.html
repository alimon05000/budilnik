<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IslamicLibrary OS | Полное издание</title>
    <meta name="theme-color" content="#0a0f1a">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0f1a;
            --glass-bg: rgba(16, 24, 40, 0.7);
            --glass-border: rgba(212, 175, 55, 0.2);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #d4af37;
            --accent-soft: rgba(212, 175, 55, 0.1);
            --emerald: #10b981;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(212, 175, 55, 0.3);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #b8860b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background var(--transition);
        }

        .bg-glow {
            position: fixed;
            width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, rgba(16,185,129,0.03) 100%);
            filter: blur(100px);
            z-index: -1;
            top: -10%; right: -10%;
        }

        .app-shell {
            display: flex;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 300px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .logo { font-size: 22px; font-weight: 700; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .nav-tabs { display: flex; flex-direction: column; gap: 8px; }
        .tab-btn {
            background: none; border: none;
            padding: 14px 18px;
            border-radius: 14px;
            color: var(--text-muted);
            text-align: left;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all var(--transition);
        }
        .tab-btn.active {
            background: var(--accent-soft);
            color: var(--accent);
            box-shadow: inset 0 0 0 1px var(--glass-border);
        }

        .main-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }
        .main-container::-webkit-scrollbar { width: 4px; }
        .main-container::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .search-bar {
            width: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 15px 25px;
            color: var(--text-main);
            font-size: 16px;
            margin-bottom: 30px;
            outline: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 24px;
            cursor: pointer;
            transition: transform var(--transition), border-color var(--transition);
            position: relative;
            overflow: hidden;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card h3 { margin-bottom: 8px; color: var(--accent); }
        .card p { font-size: 14px; color: var(--text-muted); margin-bottom: 15px; }

        .badge {
            font-size: 11px;
            padding: 4px 10px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--emerald);
            border-radius: 8px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .reader {
            max-width: 900px;
            margin: 0 auto;
            background: var(--glass-bg);
            padding: 50px;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
        }
        .reader h1 { font-size: 32px; margin-bottom: 10px; color: var(--accent); }
        .content-block { margin-bottom: 35px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
        .content-block:last-child { border-bottom: none; }
        .content-block h2 { color: var(--emerald); margin-bottom: 15px; font-size: 22px; display: flex; align-items: center; gap: 10px;}
        .content-block h2::before { content: '◈'; font-size: 14px; color: var(--accent); }
        .content-block p { margin-bottom: 12px; font-size: 16px; text-align: justify; color: var(--text-main); line-height: 1.7; }
        
        .important-box {
            background: rgba(212, 175, 55, 0.05);
            border-left: 4px solid var(--accent);
            padding: 20px;
            border-radius: 0 16px 16px 0;
            margin: 20px 0;
            font-style: italic;
        }

        .hidden { display: none !important; }

        @media (max-width: 900px) {
            .app-shell { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 20px; }
            .reader { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="logo">Library<span>OS</span></div>
            
            <div class="nav-tabs">
                <button class="tab-btn active" data-tab="tauhid">💎 Таухид / Акида</button>
                <button class="tab-btn" data-tab="fiqh">📖 Фикх / Сунна</button>
                <button class="tab-btn" data-tab="adab">📖 Нравы (Адаб)</button>
                <button class="tab-btn" id="installBtn" style="margin-top: 20px; border: 1px dashed var(--accent);">📲 Установить PWA</button>
            </div>

            <div style="margin-top: auto;">
                <button class="tab-btn" onclick="toggleTheme()">🌓 Сменить тему</button>
            </div>
        </aside>

        <main class="main-container">
            <input type="text" class="search-bar" placeholder="Поиск по всем книгам..." id="searchInput">
            
            <div id="knowledgeGrid" class="grid"></div>

            <div id="readerView" class="reader hidden">
                <button class="tab-btn" id="closeReaderBtn" style="margin-bottom: 20px;">← Назад к списку</button>
                <div id="readerContent"></div>
            </div>
        </main>
    </div>

    <script>
        // ==================== ПОЛНАЯ БАЗА ЗНАНИЙ (ДЕТАЛЬНАЯ СТРУКТУРА) ====================
        const KNOWLEDGE_BASE = [
            // ==================== 1. АКИДА УАСИТИЙЯ (ПОДРОБНО) ====================
            {
                id: 1,
                title: "Акида Уаситийя",
                author: "Шейхуль-Ислам Ибн Таймийя",
                category: "Таухид",
                details: [
                    { title: "Шесть столпов веры (Иман)", text: "Вера в Аллаха, Его ангелов, Его Писания, Его посланников, в Последний день и в предопределение (аль-кадар) — как хорошего, так и плохого. Это основа, без которой вера человека недействительна." },
                    { title: "Правило в отношении атрибутов Аллаха", text: "Ахлю-с-Сунна подтверждает все атрибуты Аллаха, которыми Он Сам Себя описал в Коране и которыми описал Его Посланник в Сунне. Делается это без искажения (тахриф), без отрицания (та'тыль), без придания образа (такйиф) и без уподобления (тамсиль). Аллах сказал: «Нет ничего подобного Ему, и Он — Слышащий, Видящий» (42:11)." },
                    { title: "Срединный путь (Васатыйя)", text: "Ахлю-с-Сунна уа-ль-Джама'а занимают срединное положение между всеми сектами. В вопросах атрибутов — между джахмитами (отрицающими) и мушаббихитами (уподобляющими). В вопросах деяний — между джабаритами (принуждение) и кадаритами (абсолютная свобода воли). В отношении сподвижников — между рафидитами (проклинающими) и хариджитами (обвиняющими в неверии)." },
                    { title: "Возвышенность Аллаха (аль-Улювв)", text: "Аллах находится над Своим Троном, возвышен над творениями Своей Сущностью. Доводы из Корана: «Милосердный вознесся на Трон» (20:5). В то же время Он близок к творениям Своим знанием и слышит их мольбы, как сказано: «Я близок, отвечаю на мольбу взывающего» (2:186). Эти два атрибута не противоречат друг другу." },
                    { title: "Коран — Слово Аллаха", text: "Коран — это Речь Аллаха, ниспосланная, а не сотворенная. Она изошла от Него и к Нему вернется. Читаемый нами Коран в буквальном смысле является Словом Аллаха, а не просто рассказом о Нем. Вера в несотворенность Корана — убеждение Ахлю-с-Сунна." },
                    { title: "Положение сподвижников", text: "Лучшие из общины после Пророка (мир ему): Абу Бакр ас-Сиддик, затем Умар аль-Фарук, затем Усман Зу-н-Нурейн, затем Али ибн Абу Талиб. Необходимо любить всех сподвижников, воздерживаться от обсуждения их разногласий и просить Аллаха быть довольным ими. Поношение сподвижников — признак ереси." },
                    { title: "Вера в Предопределение (аль-Кадар)", text: "Включает четыре ступени: 1) Знание Аллаха обо всем. 2) Запись всего в Хранимой Скрижали. 3) Воля Аллаха, которая всегда исполняется. 4) Сотворение Аллахом всех деяний. При этом раб обладает свободой выбора, но его выбор сотворен Аллахом." },
                    { title: "Верующие увидят Аллаха в Раю", text: "Ахлю-с-Сунна верят, что верующие увидят своего Господа в День воскресения и в Раю, как ясно видят солнце и луну. Это наивысшее наслаждение для обитателей Рая, на что указывают аяты: «Лица в тот день сияющие, на Господа своего взирающие» (75:22-23)." },
                    { title: "Вера в ангелов, Писания и посланников", text: "Вера во всех ангелов, названных и неназванных. Вера во все ниспосланные Писания (Тору, Евангелие, Псалтырь, Свитки, Коран). Вера во всех посланников, не делая различий между ними. Мухаммад — последний пророк и посланник ко всем людям." },
                    { title: "Испытание в могиле и воскрешение", text: "После смерти человека к нему приходят два ангела (Мункар и Накир) и спрашивают о Господе, религии и пророке. Верующий отвечает правильно, а лицемер и неверный — нет. Это испытание — истина, как и мучения и блаженство в могиле." },
                    { title: "Чудеса святых (карамат)", text: "Ахлю-с-Сунна верят в чудеса, которые Аллах может явить через Своих праведных рабов (аулия), как это было у людей пещеры (асхаб аль-кахф) и у сподвижников. Это не противоречит чудесам пророков (му'джизат)." },
                    { title: "Судный день, Рай и Ад", text: "Вера в Судный день, воскрешение из могил, расчет, весы (мизан), мост (сырат), водоем Пророка (хауд). Рай и Ад уже сотворены и будут существовать вечно, а их обитатели пребудут в них навечно." }
                ]
            },
            // ==================== 2. ОСНОВЫ ИМАНА (ПОДРОБНО) ====================
            {
                id: 2,
                title: "Основы Имана",
                author: "Редакция «К Исламу»",
                category: "Таухид",
                details: [
                    { title: "Семь условий «Ля иляха илля-Ллах»", text: "1) Знание смысла, несовместимое с невежеством. 2) Убежденность, несовместимая с сомнением. 3) Принятие, несовместимое с отклонением. 4) Подчинение, несовместимое с отказом. 5) Правдивость, несовместимая с ложью. 6) Искренность, несовместимая с многобожием. 7) Любовь, несовместимая с ненавистью. Без этих условий свидетельство не приносит пользы." },
                    { title: "Три вида Таухида", text: "1) Таухид ар-Рубубийя (Единство Господства): признание, что Аллах — единственный Творец, Властелин, Управляющий. 2) Таухид аль-Улюхийя (Единство Божественности): посвящение всех видов поклонения только Аллаху. 3) Таухид аль-Асма уа ас-Сыфат (Единство Имен и Атрибутов): подтверждение имен и качеств Аллаха без уподобления и без отрицания." },
                    { title: "Понятие поклонения (Ибада)", text: "Поклонение — это общее название для всех слов и дел, явных и скрытых, которые любит Аллах и которыми Он доволен. Виды поклонения: мольба (ду'а), любовь, страх, надежда, упование (таваккуль), смирение, жертвоприношение, обет (назр). Условия принятия: искренность ради Аллаха и следование Сунне." },
                    { title: "Большое и малое многобожие (ширк)", text: "Большое многобожие выводит человека из Ислама и делает вечным обитателем Ада. Это — поклонение кому-либо наряду с Аллахом. Малое многобожие не выводит из религии, но является великим грехом. Его пример — показуха (рийа), клятва не Аллахом, слова «как пожелал Аллах и ты»." },
                    { title: "Вера в Аллаха и Его атрибуты", text: "Убеждение, что Аллах — единственный Господь, единственный, кто достоин поклонения, и единственный, кто обладает божественными именами и качествами. К качествам относятся: Жизнь, Знание, Сила, Слух, Зрение, Воля, Любовь, Довольство, Гнев, Лик, Руки, Глаза, Речь." },
                    { title: "Виды поклонения", text: "1) Ду'а (мольба). 2) Страх и надежда. 3) Любовь к Аллаху. 4) Таваккуль (упование). 5) Истигаса (поиск спасения). 6) Жертвоприношение. 7) Обет (назр). 8) Покорность и смирение. Все эти виды должны быть посвящены только Аллаху." },
                    { title: "Неверие (куфр) и лицемерие (нифак)", text: "Куфр бывает двух видов: большой (выводит из религии) и малый (не выводит, но является тяжким грехом). Нифак также бывает большим (скрытие неверия) и малым (лицемерие в делах: ложь, нарушение обещания, предательство)." },
                    { title: "Предопределение (аль-Кадар)", text: "Вера в предопределение — шестой столп имана. Аллах знал обо всем извечным знанием, записал это в Хранимой Скрижали, и все происходит по Его воле и желанию. При этом рабы совершают свои деяния реально и несут за них ответственность." },
                    { title: "Вера в ангелов и Писания", text: "Ангелы созданы из света, они не грешат, подчиняются всем повелениям Аллаха. Известные ангелы: Джибриль (приносит откровение), Микаиль (ведает дождем), Исрафиль (трубит в рог), Малик (страж Ада). Священные Писания: Тора, Евангелие, Псалтырь, Свитки Ибрахима и Мусы, Коран." },
                    { title: "Вера в посланников", text: "Вера во всех посланников Аллаха, от Адама до Мухаммада, не делая различий между ними. Известны 25 имен посланников, упомянутых в Коране. Мухаммад — последний пророк и посланник ко всем людям и джиннам." },
                    { title: "Вера в Последний день", text: "Вера в воскресение после смерти, сбор на площади Суда, расчет, весы (мизан), раздачу свитков, мост (сырат), водоем Пророка (хауд), заступничество (шафа'а), Рай и Ад." },
                    { title: "Убеждения сердца", text: "Иман (вера) — это убеждение сердца, подтверждение языком и действие органами. Вера увеличивается от покорности и уменьшается от ослушания. Ахлю-с-Сунна не называют мусульманина, совершающего большой грех, неверным, но и не считают его веру совершенной." }
                ]
            },
            // ==================== 3. БУЛУГ АЛЬ-МАРАМ (ПОДРОБНО) ====================
            {
                id: 3,
                title: "Булуг аль-Марам",
                author: "Ибн Хаджар аль-Аскалани",
                category: "Фикх",
                details: [
                    { title: "Книга Очищения (Тахара)", text: "Вода является чистой и очищающей. Морская вода чиста, а мертвые морские животные дозволены. Вода объемом два кулла (~227 литров) не оскверняется при попадании нечистот, если не изменились её свойства. Посуда, облизнутая собакой, моется семь раз, первый — землей. Моча грудного мальчика, не питающегося твердой пищей, достаточно окропить водой. Шкура животного очищается дублением. Человек, рана, морские животные и насекомые без крови — чисты." },
                    { title: "Омовение (Вуду) и купание (Гусль)", text: "Омовение обязательно для намаза. Его фарды: намерение, мытье лица, мытье рук до локтей, обтирание головы, мытье ног до щиколоток, порядок. Желательно: использование сивака, трехкратное мытье, полоскание рта и носа. Купание обязательно после полового осквернения и менструации. В составе купания: намерение, мытье всего тела, полоскание рта и носа." },
                    { title: "Намаз: времена и условия", text: "Времена намазов: Зухр (после зенита до длины тени предмета), Аср (до пожелтения солнца), Магриб (до исчезновения красной зари), Иша (до полуночи), Фаджр (до восхода солнца). Условия намаза: чистота, покрытие аурата, кибла, время, намерение. Запрещены намазы во время восхода, зенита и заката солнца, а также после фаджра и после асра." },
                    { title: "Групповой намаз (Джама'ат)", text: "Вознаграждение за групповой намаз в 27 раз больше. Мужчинам обязательно посещение мечети, если нет уважительной причины. Имамом должен быть тот, кто лучше всех знает Коран. Женщинам лучше молиться дома. Тот, кто застал поясной поклон (руку') с имамом, застал весь ракаат." },
                    { title: "Пост (Сыям)", text: "Пост в Рамадан обязателен для каждого совершеннолетнего мусульманина. Намерение необходимо делать до рассвета. Спешное разговение (ифтар) и предрассветная трапеза (сухур) — Сунна. Пост нарушается: едой, питьем, половой близостью, семяизвержением. Искупление за половую близость днем в Рамадан — освобождение раба, или пост 2 месяца, или кормление 60 бедняков." },
                    { title: "Закят и его виды", text: "Закят обязателен с золота (20 мискалей), серебра (200 дирхемов), скота (верблюды, коровы, овцы), урожая (5 васков, ~653 кг), товара торговли. Нисаб верблюдов: 5 голов — 1 овца, 25 голов — годовалая верблюдица, 36 — двухгодовалая, 46 — трехгодовалая. Закят аль-Фитр: 1 са' (около 2,5 кг) основного продукта питания, раздается до праздничного намаза." },
                    { title: "Паломничество (Хаджж)", text: "Хаджж обязателен раз в жизни для тех, кто имеет возможность. Места вступления в ихрам (микаты): Зуль-Хулейфа (для жителей Медины), Джухфа (для Шама), Карн аль-Маназиль (для Неджда), Йаламлам (для Йемена). Основные обряды: ихрам, таваф (обход Каабы), са'й (бег между Сафой и Марвой), стояние на Арафате, ночевка в Муздалифе, бросание камешков в Мине." },
                    { title: "Брак (Никах)", text: "Брак — это Сунна пророков. Условия брака: предложение (иджаб) и принятие (кабуль), опекун невесты, два свидетеля, калым (махр). Запрещены женщины: мать, дочь, сестра, тетя, жена отца, жена сына, молочные родственницы. Запрещено жениться на двух сестрах одновременно. Запрещен временный брак и брак шигар." },
                    { title: "Торговля и запретные сделки", text: "Аллах разрешил торговлю и запретил ростовщичество (риба). Запрещены: продажа спиртного, свинины, мертвечины, идолов, собак. Запрещены виды сделок: музабана (обмен сухих фиников на свежие), мулямаса (покупка вслепую), накш (набивание цены). Торговля должна быть основана на взаимном согласии и ясности." },
                    { title: "Этикет и нравственность (Адаб)", text: "Обязанности мусульманина: отвечать на приветствие, навещать больного, провожать похороны, принимать приглашение, желать добра другим. Запрещены: сплетни, зависть, гнев, высокомерие, подозрительность. Пророк (мир ему) сказал: «Лучший из вас — тот, кто обладает лучшим нравом»." }
                ]
            },
            // ==================== 4. УМДАТУ-ЛЬ-ФИКХ (ПОДРОБНО) ====================
            {
                id: 4,
                title: "Умдату-ль-Фикх",
                author: "Ибн Кудама аль-Макдиси",
                category: "Фикх",
                details: [
                    { title: "Положения воды и нечистот", text: "Вода создана чистой и очищающей. Очищение может быть только водой. Если вода достигает двух кулля (около 227 литров) или является проточной, она не становится нечистой, пока не изменится её цвет, вкус или запах. Нечистоты: кровь, моча, кал, сперма, вино, мертвечина. Исключения: мертвая рыба, саранча, человек, морские животные. Шерсть мертвых животных чиста, а кожа — нечиста, пока не выдублена." },
                    { title: "Омовение (Вуду)", text: "Намерение обязательно. Фарды омовения: мытье лица, мытье рук до локтей, обтирание всей головы, мытье ног до щиколоток, порядок. Желательно: произнесение «Бисмиллях», мытье кистей рук, полоскание рта и носа, протирание ушей, мытье трижды. Омовение нарушается: выделениями из двух проходов, выходом нечистот, потерей сознания, сном, прикосновением к половому органу, поеданием верблюжьего мяса." },
                    { title: "Большое омовение (Гусль)", text: "Обязательно после выхода семени, полового акта, окончания менструации и послеродового кровотечения. Фарды: намерение и мытье всего тела, включая полоскание рта и носа. Желательно: начать с мытья рук, затем вымыть половые органы, затем совершить вуду, затем облить тело трижды. Мужчине и женщине дозволено купаться из одного сосуда." },
                    { title: "Очищение песком (Таяммум)", text: "Разрешается при отсутствии воды, болезни, сильном холоде. Достаточно один раз ударить ладонями о землю, затем обтереть лицо и кисти рук. Таяммум нарушается всем, что нарушает вуду, а также при появлении воды." },
                    { title: "Менструация (Хайд) и послеродовое кровотечение", text: "Женщине во время менструации запрещены: намаз, пост, таваф, чтение Корана, прикосновение к нему, пребывание в мечети, половая близость. Минимальный срок — день и ночь, максимальный — 15 дней. После окончания необходимо совершить гусль. Послеродовое кровотечение длится максимум 40 дней." },
                    { title: "Намаз: условия, арканы и ваджибы", text: "Условия намаза: чистота, покрытие аурата, кибла, время, намерение. Арканы (столпы): стояние, вступительный такбир, чтение аль-Фатихи, поясной поклон (руку'), выпрямление после него, земные поклоны (суджуд) на семь органов, сидение между суджудами, последний ташаххуд, таслим, порядок. Ваджибы: такбиры (кроме вступительного), тасбих в руку' и суджуде, первый ташаххуд, благословение Пророка в последнем ташаххуде." },
                    { title: "Земной поклон по невнимательности (Суджуд ас-Сахви)", text: "Совершается, если человек забыл ваджиб, сделал лишнее действие или сомневается в количестве ракаатов. Если забыл первый ташаххуд и начал вставать, то возвращается, если не выпрямился полностью. Суджуд ас-сахви совершается из двух земных поклонов перед таслимом или после него." },
                    { title: "Желательные намазы (Сунан ар-Ратиба)", text: "10 ракаатов: 2 до зухра, 2 после зухра, 2 после магриба, 2 после иша, 2 перед фаджром. Витр — ночной намаз из нечетного числа ракаатов, время от иша до фаджра. Таравих — 20 ракаатов в Рамадан. Молитва затмения, молитва о дожде." },
                    { title: "Пятничный намаз (Джуму'а)", text: "Обязателен для свободных, совершеннолетних, не больных мужчин, проживающих в городе. Условия: время зухра, в населенном пункте, присутствие 40 человек, две хутбы перед намазом. Желательно: полное омовение, благовония, ранний приход. Во время хутбы нельзя разговаривать." },
                    { title: "Закят: нисабы по каждому виду скота", text: "Верблюды: с 5 голов — 1 овца; 25 голов — бинт махад (годовалая); 36 голов — бинт лябун (2-годовалая); 46 голов — хикка (3-годовалая); 61 голова — джаза'а (4-годовалая); 76 голов — 2 бинт лябун; 91 голова — 2 хикка. Коровы: с 30 голов — таби' (годовалый бычок или телка); с 40 голов — мусинна (2-годовалая). Овцы: с 40 до 120 голов — 1 овца; с 121 до 200 — 2 овцы; с 201 до 300 — 3 овцы; далее за каждую сотню — 1 овца." },
                    { title: "Закят с урожая и драгоценностей", text: "С урожая, орошаемого дождем, — 1/10 (ушр). С урожая, орошаемого трудом, — 1/20 (нисф ушр). Нисаб — 5 васков (около 653 кг). Золото: нисаб — 20 мискалей (~85 гр), закят — 1/40 (2,5%). Серебро: нисаб — 200 дирхемов (~595 гр), закят — 5 дирхемов. Женские украшения не облагаются закятом, если предназначены для ношения." },
                    { title: "Категории получателей закята", text: "1) Бедняки (фукара). 2) Неимущие (масакин). 3) Сборщики закята. 4) Те, чьи сердца склоняют к Исламу. 5) Выкуп рабов. 6) Должники. 7) Путники. 8) На пути Аллаха (фи сабилиЛлях). Нельзя давать закят: богатым, потомкам Хашима и Мутталиба, родителям, детям, жене." },
                    { title: "Пост в Рамадан и его искупление", text: "Обязателен для каждого совершеннолетнего мусульманина. Разрешено не поститься: больному, путнику, беременной и кормящей, женщинам с менструацией, старикам. Искупление за половую близость днем в Рамадан: освобождение раба, если нет — пост 2 месяца подряд, если нет — кормление 60 бедняков. Тот, кто сознательно прервал пост без причины, обязан возместить." },
                    { title: "Паломничество (Хаджж): столпы и обязательства", text: "Столпы хаджа: ихрам, стояние на Арафате, таваф аль-ифада, са'й между Сафой и Марвой. Обязательства хаджа: ночевка в Муздалифе, ночевка в Мине, бросание камешков, бритье головы, прощальный таваф. Виды хаджа: ифрад (только хадж), кыран (хадж и умра вместе), таматту' (сначала умра, затем хадж). Паломник обязан принести жертву (хади) при кыран и таматту'." },
                    { title: "Правила брака (Никах)", text: "Условия брака: предложение и принятие, опекун невесты, два свидетеля. Махр (калым) может быть любым имуществом. Запрещены женщины по родству, молочному родству, а также две сестры одновременно. Мужчина может иметь до четырех жен. Жена имеет право на пропитание, одежду и отдельное жилье. Муж обязан справедливо делить ночи между женами." },
                    { title: "Развод (Таляк)", text: "Свободный мужчина имеет право на три развода. Развод во время менструации — нововведение (бид'а). После первого или второго развода муж может вернуть жену в течение 'идды (период выжидания). После третьего развода женщина становится запретной, пока не выйдет замуж за другого и не разведется с ним. 'Идда для разведенной женщины — три менструальных цикла." },
                    { title: "Торговля и запретные сделки", text: "Запрещены: продажа спиртного, свинины, мертвечины, идолов, собак, обман (накш), мошенничество, ростовщичество (риба). Риба бывает двух видов: риба аль-фадль (обмен одинаковых товаров с избытком) и риба ан-наси'а (отсрочка платежа с увеличением). Дозволен салям (предоплата) с четкими условиями." },
                    { title: "Наследственное право (Фараид)", text: "Доли наследников: муж — 1/2 или 1/4; жена — 1/4 или 1/8; дочь — 1/2 или 2/3; отец — 1/6; мать — 1/6 или 1/3. Асабаты (родственники по мужской линии) получают остаток. Препятствия наследованию: различие религий, рабство, убийство. Мусульманин не наследует неверному." },
                    { title: "Освобождение рабов", text: "Освобождение раба — великое благо. Формы освобождения: прямое освобождение (и'так), тадбир (освобождение после смерти), мукатаба (самовыкуп), умм аль-валяд (рабыня, родившая от хозяина). Право опекунства (валя) остается за тем, кто освободил." }
                ]
            }
        ];

        const app = {
            currentTab: 'tauhid',
            init() {
                this.renderGridByTab(this.currentTab);
                this.setupEventListeners();
                this.setupPWA();
            },

            renderGridByTab(tab) {
                let filteredBooks = KNOWLEDGE_BASE;
                if (tab === 'tauhid') {
                    filteredBooks = KNOWLEDGE_BASE.filter(book => book.category === 'Таухид');
                } else if (tab === 'fiqh') {
                    filteredBooks = KNOWLEDGE_BASE.filter(book => book.category === 'Фикх');
                } else if (tab === 'adab') {
                    filteredBooks = [];
                }
                this.renderGrid(filteredBooks);
            },

            renderGrid(books) {
                const grid = document.getElementById('knowledgeGrid');
                if (books.length === 0) {
                    grid.innerHTML = `<div class="card" style="grid-column:1/-1; text-align:center;"><p>📖 Раздел «Нравы (Адаб)» в разработке.<br>Скоро будут добавлены книги по нравственности и хадисам.</p></div>`;
                    return;
                }
                grid.innerHTML = books.map(book => `
                    <div class="card" data-id="${book.id}">
                        <span class="badge">${book.category}</span>
                        <h3 style="margin-top:10px">${book.title}</h3>
                        <p style="font-size: 12px; color: var(--accent);">${book.author}</p>
                        <p>${book.details[0].text.substring(0, 120)}...</p>
                        <div style="color:var(--accent); font-size:12px; font-weight:600; margin-top: 10px;">📖 Читать подробный конспект →</div>
                    </div>
                `).join('');
                
                document.querySelectorAll('#knowledgeGrid .card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        const id = parseInt(card.getAttribute('data-id'));
                        this.openReader(id);
                    });
                });
            },

            openReader(id) {
                const book = KNOWLEDGE_BASE.find(b => b.id === id);
                if (!book) return;
                
                const contentDiv = document.getElementById('readerContent');
                const grid = document.getElementById('knowledgeGrid');
                const reader = document.getElementById('readerView');
                
                grid.classList.add('hidden');
                reader.classList.remove('hidden');
                
                contentDiv.innerHTML = `
                    <span class="badge">${book.category}</span>
                    <h1>${book.title}</h1>
                    <p style="color:var(--accent); margin-bottom: 25px;">Автор: ${book.author}</p>
                    <div class="important-box">📚 Детальное содержание книги (${book.details.length} основных разделов):</div>
                    ${book.details.map(d => `
                        <div class="content-block">
                            <h2>${d.title}</h2>
                            <p>${d.text}</p>
                        </div>
                    `).join('')}
                `;
                window.scrollTo(0,0);
            },

            closeReader() {
                const grid = document.getElementById('knowledgeGrid');
                const reader = document.getElementById('readerView');
                reader.classList.add('hidden');
                grid.classList.remove('hidden');
                document.getElementById('searchInput').value = '';
                this.renderGridByTab(this.currentTab);
            },

            search(query) {
                const lowerQuery = query.toLowerCase();
                if (!lowerQuery) {
                    this.renderGridByTab(this.currentTab);
                    return;
                }
                
                let booksToSearch = KNOWLEDGE_BASE;
                if (this.currentTab === 'tauhid') booksToSearch = KNOWLEDGE_BASE.filter(b => b.category === 'Таухид');
                else if (this.currentTab === 'fiqh') booksToSearch = KNOWLEDGE_BASE.filter(b => b.category === 'Фикх');
                else if (this.currentTab === 'adab') booksToSearch = [];
                
                const filtered = booksToSearch.filter(book => {
                    const titleMatch = book.title.toLowerCase().includes(lowerQuery);
                    const authorMatch = book.author.toLowerCase().includes(lowerQuery);
                    const detailsMatch = book.details.some(d => d.title.toLowerCase().includes(lowerQuery) || d.text.toLowerCase().includes(lowerQuery));
                    return titleMatch || authorMatch || detailsMatch;
                });
                this.renderGrid(filtered);
            },

            setupEventListeners() {
                const searchInput = document.getElementById('searchInput');
                searchInput.addEventListener('input', (e) => this.search(e.target.value));
                
                document.getElementById('closeReaderBtn').addEventListener('click', () => this.closeReader());
                
                document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const tab = btn.getAttribute('data-tab');
                        this.currentTab = tab;
                        document.querySelectorAll('.tab-btn[data-tab]').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.closeReader();
                        this.renderGridByTab(tab);
                    });
                });
            },

            setupPWA() {
                let deferredPrompt;
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                });
                document.getElementById('installBtn').onclick = () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        deferredPrompt.userChoice.then(() => deferredPrompt = null);
                    } else {
                        alert('Установка доступна в поддерживаемых браузерах (Chrome, Edge, Safari)');
                    }
                };
            }
        };

        function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', newTheme);
        }

        document.addEventListener('DOMContentLoaded', () => app.init());

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.log);
        }
    </script>
</body>
</html>
